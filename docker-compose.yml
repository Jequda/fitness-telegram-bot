services:
  postgres:
    image: postgres:16-alpine
    container_name: fitness-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitness_bot
      POSTGRES_USER: fitness_bot
      POSTGRES_PASSWORD: fitness_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
